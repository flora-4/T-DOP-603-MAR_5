apiVersion: v1
kind: ServiceAccount

metadata:
  name: traefik-account
  namespace: kube-public

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole

metadata:
  name: traefik-role

rules:
  - apiGroups:
      - ""
    resources:
      - services
      - endpoints
      - secrets
      - nodes
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - extensions
      - networking.k8s.io
    resources:
      - ingresses
      - ingressclasses
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding

metadata:
  name: traefik-role-binding

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik-role

subjects:
  - kind: ServiceAccount
    name: traefik-account
    namespace: kube-public