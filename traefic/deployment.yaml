apiVersion: apps/v1
kind: Deployment

metadata:
  name: traefik
  namespace: kube-public

spec:
  replicas: 2

  selector:
    matchLabels:
      app: traefik

  template:
    metadata:
      labels:
        app: traefik

    spec:
      serviceAccountName: traefik-account

      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - traefik
              topologyKey: kubernetes.io/hostname

      containers:
        - name: traefik
          image: traefik:2.7
          args:
            - --api.insecure=true
            - --providers.kubernetesingress=true
            - --entrypoints.web.address=:80

          ports:
            - name: web
              containerPort: 80
            - name: dashboard
              containerPort: 8080